<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardian Crypto Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Guardian Crypto Dashboard</h1>
    <p class="subtitle">Track BTC, ETH, and crypto market signals.</p>

    <section class="cards">
      <div class="card">
        <h2>Bitcoin</h2>
        <p id="btc-price">Loading...</p>
      </div>

      <div class="card">
        <h2>Ethereum</h2>
        <p id="eth-price">Loading...</p>
      </div>

      <div class="card">
        <h2>Guardian Signal</h2>
        <p id="signal">Waiting for data...</p>
      </div>
    </section>

    <button onclick="loadPrices()">Refresh Prices</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
